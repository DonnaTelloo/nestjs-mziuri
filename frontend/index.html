<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Backend - NestJS</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin-bottom: 40px; border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        .section h2 { margin-top: 0; color: #333; }
        .item { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 3px; }
        button { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .add-form { margin: 10px 0; }
        .add-form input, .add-form textarea { margin: 5px; padding: 5px; }
    </style>
</head>
<body>
    <h1>Shopping Backend Demo</h1>

    <div class="section">
        <h2>Users</h2>
        <div id="users"></div>
    </div>

    <div class="section">
        <h2>Products</h2>
        <div class="add-form">
            <input type="text" id="productName" placeholder="Product Name">
            <textarea id="productDescription" placeholder="Description"></textarea>
            <input type="number" id="productPrice" placeholder="Price" step="0.01">
            <input type="number" id="productStock" placeholder="Stock">
            <input type="text" id="productCategory" placeholder="Category">
            <button onclick="addProduct()">Add Product</button>
        </div>
        <div id="products"></div>
    </div>

    <div class="section">
        <h2>Orders</h2>
        <div class="add-form">
            <input type="number" id="orderUserId" placeholder="User ID">
            <input type="text" id="orderItems" placeholder="Items (format: productId:quantity,productId:quantity)">
            <button onclick="addOrder()">Add Order</button>
        </div>
        <div id="orders"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
